#
# Verify the tagged `bisque` crate selected by the maintainer.

name: Release verification

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RELEASE_TAG: ${{ inputs.tag }}

concurrency:
  group: release-verification
  cancel-in-progress: false

jobs:
  release-metadata:
    name: release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - name: Check tag matches crate version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::run the release workflow from main"
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::invalid release tag: $RELEASE_TAG"
            exit 1
          fi
          version="$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "bisque") | .version')"
          if [ "$RELEASE_TAG" != "v${version}" ]; then
            echo "::error::tag $RELEASE_TAG does not match bisque version $version"
            exit 1
          fi
          repository="$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "bisque") | .repository')"
          if ! grep -Fq "## [$version] -" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no dated section for $version"
            exit 1
          fi
          if ! grep -Fxq "[Unreleased]: ${repository}/compare/${RELEASE_TAG}...HEAD" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no current Unreleased comparison link"
            exit 1
          fi
          if ! grep -Fxq "[$version]: ${repository}/releases/tag/${RELEASE_TAG}" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no release link for $RELEASE_TAG"
            exit 1
          fi
          tag_commit="$(git rev-parse HEAD)"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "::error::$RELEASE_TAG is not reachable from main"
            exit 1
          fi

  fmt:
    name: rustfmt
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    needs: release-metadata
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --locked --workspace --all-features

  test-filters:
    name: test filters
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Assert filters select tests
        shell: bash
        run: |
          for filter in audio:: contract:: validation:: no_alloc:: snapshots::; do
            echo "checking $filter"
            cargo test --locked --workspace --all-features -- "$filter" --list | tee "filter-${filter//:/_}.txt"
            if ! grep -q ': test$' "filter-${filter//:/_}.txt"; then
              echo "::error::Test filter '$filter' selected no tests."
              exit 1
            fi
          done
  no-alloc:
    name: no-alloc
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: "cargo test --locked --workspace --all-features -- no_alloc::"

  no-fma:
    name: no-FMA lint
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Deterministic-source lint
        run: cargo xtask check-determinism

  snapshots-fresh:
    name: snapshots freshness
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo xtask check

  msrv:
    name: MSRV (1.85)
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTUP_TOOLCHAIN: "1.85"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo check --locked -p bisque --all-features --lib --examples

  feature-powerset:
    name: feature combinations
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: cargo-hack@0.6.45
      - run: cargo hack --locked --workspace --feature-powerset check

  docs:
    name: doc links
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo doc --locked --workspace --no-deps --all-features

  mdbook:
    name: mdBook
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: mdbook@0.5.3
      - run: mdbook build docs
      - run: cargo xtask check-docs

  typos:
    name: typos
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

  deny:
    name: cargo-deny
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check

  machete:
    name: unused dependencies
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: cargo-machete@0.9.2
      - run: cargo machete

  third-party-licenses:
    name: third-party licenses
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: cargo-about@0.9.0
      - name: Regenerate third-party notices and assert no diff
        shell: bash
        run: |
          cargo about generate --locked --all-features --fail \
            -c about.toml about.hbs \
            -o THIRD-PARTY-LICENSES.md \
            --manifest-path Cargo.toml
          git diff --exit-code -- THIRD-PARTY-LICENSES.md

  license-header:
    name: license headers
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - name: Check SPDX header on every source file
        shell: bash
        run: bash ./.github/scripts/check-headers.sh

  package:
    name: package dry-run
    needs:
      - release-metadata
      - fmt
      - clippy
      - test
      - test-filters
      - no-alloc
      - no-fma
      - snapshots-fresh
      - msrv
      - feature-powerset
      - docs
      - mdbook
      - typos
      - deny
      - machete
      - third-party-licenses
      - license-header
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo publish --locked -p bisque --dry-run
