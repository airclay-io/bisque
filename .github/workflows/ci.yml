#
# Some gates use test-name filters. Keep each filter paired with real tests.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

  # Full test suite on all supported CI operating systems.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --locked --workspace --all-features

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage report
        run: >
          cargo llvm-cov --locked --workspace --exclude xtask
          --all-features --lcov --output-path lcov.info
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
          retention-days: 7

  # Test filters need to select at least one test. Cargo exits 0 for empty filters.
  test-filters:
    name: test filters
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Assert filters select tests
        shell: bash
        run: |
          for filter in audio:: contract:: validation:: no_alloc:: snapshots::; do
            echo "checking $filter"
            cargo test --locked --workspace --all-features -- "$filter" --list | tee "filter-${filter//:/_}.txt"
            if ! grep -q ': test$' "filter-${filter//:/_}.txt"; then
              echo "::error::Test filter '$filter' selected no tests."
              exit 1
            fi
          done
  # No allocation in the audio path. Runs the `no_alloc::` test group.
  no-alloc:
    name: no-alloc
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: "cargo test --locked --workspace --all-features -- no_alloc::"

  # Reject FMA contraction, fast-math, and bare std transcendentals in
  # deterministic source. Production has no allowlist, and `// test-oracle:` is
  # valid only inside trailing #[cfg(test)] test modules.
  no-fma:
    name: no-FMA lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Deterministic-source lint
        run: cargo xtask check-determinism

  # Regenerate the snapshot manifest and assert no diff.
  snapshots-fresh:
    name: snapshots freshness
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Regenerate the committed-output manifest and assert no diff
        shell: bash
        # `check` regenerates the manifest and slices, then reports any
        # testdata diff, including removed or untracked slices.
        run: cargo xtask check

  # Render the audible listening bench and attach it as an artifact, so any
  # change that touches DSP can be reviewed by ear next to the hash diff.
  # The bench helps find audible problems. The numeric suites decide pass/fail.
  listen:
    name: listening bench
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo xtask listen
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: listening-bench
          path: target/listen/
          if-no-files-found: error
          retention-days: 7

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTUP_TOOLCHAIN: "1.85"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo check --locked -p bisque --all-features --lib --examples

  feature-powerset:
    name: feature combinations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: cargo-hack@0.6.45
      - run: cargo hack --locked --workspace --feature-powerset check

  semver:
    name: semver
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Find latest release baseline
        id: baseline
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          baseline="$(git tag --merged "$BASE_SHA" --list 'v[0-9]*' --sort=-version:refname | head -n 1)"
          if [[ -n "$baseline" ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "rev=$baseline" >> "$GITHUB_OUTPUT"
            echo "Checking public API against $baseline"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No release tag exists yet; prerelease API changes are allowed."
          fi
      - uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2
        if: steps.baseline.outputs.found == 'true'
        with:
          baseline-rev: ${{ steps.baseline.outputs.rev }}

  docs:
    name: doc links
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo doc --locked --workspace --no-deps --all-features
      # The mdBook is the contract source. A PR that changes it incorrectly is
      # caught here before a tag release builds the book.
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: mdbook@0.5.3
      - run: mdbook build docs
      - run: cargo xtask check-docs

  # Verify packaging before release by building the package exactly as
  # `cargo publish` would (manifest, includes, README, license metadata,
  # standalone compile).
  package:
    name: package dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo publish --locked -p bisque --dry-run

  typos:
    name: typos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check

  machete:
    name: unused dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: cargo-machete@0.9.2
      - run: cargo machete

  third-party-licenses:
    name: third-party licenses
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: cargo-about@0.9.0
      - name: Regenerate third-party notices and assert no diff
        shell: bash
        run: |
          cargo about generate --locked --all-features --fail \
            -c about.toml about.hbs \
            -o THIRD-PARTY-LICENSES.md \
            --manifest-path Cargo.toml
          git diff --exit-code -- THIRD-PARTY-LICENSES.md

  license-header:
    name: license headers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check SPDX header on every source file
        shell: bash
        run: bash ./.github/scripts/check-headers.sh

  workflow-lint:
    name: workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: zizmor@1.26.1
      - run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - run: zizmor --format=github .github/workflows

  required:
    name: required
    if: ${{ always() }}
    needs:
      - fmt
      - clippy
      - test
      - coverage
      - test-filters
      - no-alloc
      - no-fma
      - snapshots-fresh
      - msrv
      - feature-powerset
      - semver
      - docs
      - package
      - typos
      - deny
      - machete
      - third-party-licenses
      - license-header
      - workflow-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RESULTS: ${{ toJSON(needs) }}
    steps:
      - name: Require every blocking job
        shell: bash
        run: |
          failed="$(jq -r '
            to_entries[]
            | select(
                .value.result != "success"
                and (.key != "semver" or .value.result != "skipped")
              )
            | "\(.key)=\(.value.result)"
          ' <<<"$RESULTS")"
          if [[ -n "$failed" ]]; then
            echo "Blocking jobs did not pass:"
            echo "$failed"
            exit 1
          fi
