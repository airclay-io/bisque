name: Bug report
description: Something behaves differently than the docs or the contract say.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you did, what you expected, and what happened instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: >-
        The smallest code or steps that show it. Include the bisque version, the
        OS, and any non-default features.
    validations:
      required: true
